<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieLog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

  <header>
    <div class="header-content">
      <h1><i class="fas fa-film"></i> MovieLog</h1>
      <p>Din personliga filmlogg</p>
    </div>
  </header>

  <div class="search-container">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input id="searchInput" type="text" placeholder="Sök filmer... (t.ex. Inception)" autocomplete="off">
    </div>
  </div>

  <div id="results" class="movies-grid"></div>

  <div id="pagination-container">
    <button id="loadMoreBtn" onclick="loadMore()">
      <i class="fas fa-chevron-down"></i> Ladda fler filmer
    </button>
  </div>

  <div class="tmdb-credit">
    <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>

    <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">
      <img src="assets/tmdb-logo.svg" alt="TMDB Logo">
    </a>
  </div>

  <footer>
    <p>MovieLog</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
