<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieLog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

  <header>
    <div class="header-content">
      <h1><i class="fas fa-film"></i> MovieLog</h1>
      <p>Your personal movie diary</p>
    </div>

    <div class="nav-buttons">
      <button id="btn-search" class="nav-link active" onclick="goHome(this)"><i class="fas fa-search"></i> Search</button>
      <button class="nav-link" onclick="showMyList('watched', this)"><i class="fas fa-check"></i> Watched</button>
      <button class="nav-link" onclick="showMyList('watchlist', this)"><i class="fas fa-clock"></i> Watchlist</button>
      <button class="nav-link" onclick="showMyList('favorites', this)"><i class="fas fa-heart"></i> Favorites</button>
    </div>
  </header>

  <div class="search-container">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input id="searchInput" type="text" placeholder="Search movies..." autocomplete="off">
    </div>
    <!-- Knapp för att lägga till egen film (dold som standard) -->
    <button id="addCustomBtn" onclick="openCustomModal()" style="display: none;"><i class="fas fa-plus"></i> Add Custom Movie</button>
  </div>

  <!-- MODAL FÖR EGEN FILM -->
  <div id="customMovieModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeCustomModal()">&times;</span>
      <h2>Add Custom Movie</h2>
      <form id="customMovieForm">
        <input type="text" id="customTitle" placeholder="Movie Title (Required)" required>
        <input type="text" id="customYear" placeholder="Year (Optional)">
        <input type="url" id="customPoster" placeholder="Poster Image URL (Optional)">
        <button type="submit" class="btn-submit">Add to List</button>
      </form>
    </div>
  </div>

  <!-- MODAL FÖR FILMDETALJER -->
  <div id="movieDetailsModal" class="modal">
    <div class="modal-content detail-modal">
      <span class="close" onclick="closeDetailModal()">&times;</span>
      <div id="movieDetailsContent">
        <!-- Laddas via JavaScript -->
      </div>
    </div>
  </div>

  <div id="results" class="movies-grid"></div>

  <div id="pagination-container">
    <button id="loadMoreBtn" onclick="loadMore()">
      <i class="fas fa-chevron-down"></i> Load More
    </button>
  </div>

  <div class="tmdb-credit">
    <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
    <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">
      <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" alt="TMDB Logo" style="width: 100px;">
    </a>
  </div>

  <footer>
    <p>&copy; 2024 MovieLog</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
